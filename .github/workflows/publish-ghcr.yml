name: Publish public GHCR images

on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: Image tag to publish
        required: true
        default: test
        type: string

permissions:
  contents: read
  packages: write

jobs:
  publish:
    name: Publish Frontend, Backend, and Worker
    runs-on: ubuntu-latest

    steps:
      - name: Check out source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Validate Frontend build settings
        env:
          LESSON_VIDEO_URL: ${{ secrets.DEMO_LESSON_VIDEO_URL }}
        run: |
          if [ -z "$LESSON_VIDEO_URL" ]; then
            echo "Repository secret DEMO_LESSON_VIDEO_URL is required." >&2
            exit 1
          fi

      - name: Build and publish Frontend
        uses: docker/build-push-action@v6
        with:
          context: src/frontend
          file: src/frontend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/awaver-frontend:${{ inputs.image_tag }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          build-args: |
            NEXT_PUBLIC_API_BASE_URL=https://api.awaver.4rnay.net
            NEXT_PUBLIC_BACKEND_HEALTH_URL=https://api.awaver.4rnay.net/health/ready
            NEXT_PUBLIC_WORKER_HEALTH_URL=https://worker.api.awaver.4rnay.net/health/ready
            NEXT_PUBLIC_LESSON_VIDEO_URL=${{ secrets.DEMO_LESSON_VIDEO_URL }}
            NEXT_PUBLIC_LESSON_VIDEO_ID=60s
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and publish Backend
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/backend/Awaver.Backend/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/awaver-backend:${{ inputs.image_tag }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and publish Worker
        uses: docker/build-push-action@v6
        with:
          context: .
          file: src/worker/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/awaver-worker:${{ inputs.image_tag }}
          labels: org.opencontainers.image.source=https://github.com/${{ github.repository }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
