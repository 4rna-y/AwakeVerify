services:
    devcontainer:
        build:
            context: .
            dockerfile: Dockerfile
        volumes:
            - ..:/workspace:cached
            - /var/run/docker.sock:/var/run/docker.sock
            - /tmp/.X11-unix:/tmp/.X11-unix:rw
        devices:
            - /dev/video0:/dev/video0
        group_add:
            - "${HOST_VIDEO_GID:-video}"
        env_file:
            - .env
        environment:
            NEXT_PUBLIC_API_BASE_URL: http://localhost:5194
            DISPLAY: ${DISPLAY:-:0}
            QT_X11_NO_MITSHM: "1"
            LIBGL_ALWAYS_SOFTWARE: "1"
        extra_hosts:
            - "host.docker.internal:host-gateway"
        ports:
            - "3000:3000"
            - "5194:5194"
            - "7031:7031"
        command: sleep infinity
        cap_add:
            - SYS_ADMIN
        security_opt:
            - seccomp:unconfined
        depends_on:
            postgres:
                condition: service_healthy
            redis:
                condition: service_healthy
            azurite:
                condition: service_started
            servicebus:
                condition: service_started

    postgres:
        image: postgres:16-alpine
        restart: unless-stopped
        environment:
            POSTGRES_DB: ${POSTGRES_DB}
            POSTGRES_USER: ${POSTGRES_USER}
            POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
        ports:
            - "5432:5432"
        volumes:
            - postgres-data:/var/lib/postgresql/data
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}",
                ]
            interval: 5s
            timeout: 5s
            retries: 10
            start_period: 10s

    redis:
        image: redis:7-alpine
        restart: unless-stopped
        command: >
            sh -c '
              if [ -n "$$REDIS_PASSWORD" ]; then
                redis-server --requirepass "$$REDIS_PASSWORD"
              else
                redis-server
              fi
            '
        environment:
            REDIS_PASSWORD: ${REDIS_PASSWORD}
        ports:
            - "6379:6379"
        volumes:
            - redis-data:/data
        healthcheck:
            test:
                - CMD-SHELL
                - 'redis-cli $${REDIS_PASSWORD:+-a "$$REDIS_PASSWORD"} --no-auth-warning ping | grep PONG'
            interval: 5s
            timeout: 3s
            retries: 10

    azurite:
        image: mcr.microsoft.com/azure-storage/azurite:latest
        restart: unless-stopped
        command: >
            azurite
              --blobHost 0.0.0.0
              --queueHost 0.0.0.0
              --tableHost 0.0.0.0
              --skipApiVersionCheck
              --loose
        ports:
            - "10000:10000"
            - "10001:10001"
            - "10002:10002"
        volumes:
            - azurite-data:/data

    servicebus-mssql:
        image: mcr.microsoft.com/mssql/server:2022-latest
        restart: unless-stopped
        environment:
            SA_PASSWORD: ${MSSQL_SA_PASSWORD}
            ACCEPT_EULA: "Y"
            MSSQL_PID: Developer
        volumes:
            - servicebus-mssql-data:/var/opt/mssql
        healthcheck:
            test:
                [
                    "CMD-SHELL",
                    "bash -c '</dev/tcp/localhost/1433' 2>/dev/null && echo ok",
                ]
            interval: 10s
            timeout: 5s
            retries: 20
            start_period: 30s

    servicebus:
        image: mcr.microsoft.com/azure-messaging/servicebus-emulator:latest
        restart: on-failure
        environment:
            SQL_SERVER: servicebus-mssql
            MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD}
            ACCEPT_EULA: "Y"
        ports:
            - "5672:5672"
        volumes:
            - ./servicebus-config.json:/ServiceBus_Emulator/ConfigFiles/Config.json:ro
        depends_on:
            servicebus-mssql:
                condition: service_healthy

volumes:
    postgres-data:
    redis-data:
    azurite-data:
    servicebus-mssql-data:
